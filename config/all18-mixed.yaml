# config/all18-mixed.yaml — 36 体 multi-venue ロスター（旧 agents.all18-mixed.json を統合）
# 使い方: npm run sim:realtime -- --config config/all18-mixed.yaml
# 秘密情報（RPC/鍵/API キー）は .env.local。各 agent の env は agent プロセスへ渡す戦略パラメータ。
run:
  protocols: [uniswap, balancer, curve, gmx, aave]
  flashArb: 1 # FlashArb コントラクトを deploy（flash agent が利用）
  blocks: 60
  seconds: 0
  seed: 1
agents:
  - id: si-codex-arb
    command: node
    args:
      - --import
      - tsx
      - examples/agents/claude-llm.ts
    wallet: AUTO
    env:
      ERIS_BASE_STRATEGY: arb
      ERIS_LLM_AUTH: codex
      ERIS_LLM_REVIEW_EVERY: "60"
      ERIS_LLM_REVIEW_OFFSET: "0"
      ERIS_FLASH_ARB: "1"
    description: codex 自己改善 / base arb / offset 0
  - id: frozen-arb
    command: node
    args:
      - --import
      - tsx
      - examples/agents/claude-llm.ts
    wallet: AUTO
    env:
      ERIS_BASE_STRATEGY: arb
      ERIS_FREEZE_STRATEGY: "1"
      ERIS_FLASH_ARB: "1"
    description: frozen 固定 / base arb
  - id: si-codex-adaptivearb
    command: node
    args:
      - --import
      - tsx
      - examples/agents/claude-llm.ts
    wallet: AUTO
